name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:
  # ── Gate 1: Static Analysis ────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal warnings)
        run: flutter analyze --fatal-warnings --no-fatal-infos

  # ── Gate 2: Format Check ───────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          dart format .
          if [ -n "$(git diff --name-only)" ]; then
            echo "FAIL: The following files need formatting:"
            git diff --name-only
            echo ""
            echo "Run 'dart format .' locally and commit the changes."
            exit 1
          fi
          echo "PASS: All files properly formatted"

  # ── Gate 3: Tests + Per-File Coverage Enforcement ──────────────────────
  test:
    name: Tests + Coverage Enforcement
    runs-on: ubuntu-latest
    needs: [analyze, format]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Verify coverage report exists
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: No coverage report generated"
            exit 1
          fi

      - name: Enforce per-file coverage thresholds
        run: bash scripts/check_coverage.sh coverage/lcov.info

  # ── Gate 4: Adversarial & Fuzz Tests ───────────────────────────────────
  adversarial:
    name: Adversarial & Fuzz Tests
    runs-on: ubuntu-latest
    needs: [analyze, format]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run adversarial crypto tests
        run: flutter test test/adversarial_crypto_test.dart -r expanded

      - name: Run fuzz tests
        run: flutter test test/fuzz_test.dart -r expanded

      - name: Run memory hygiene tests
        run: flutter test test/memory_hygiene_test.dart -r expanded

      - name: Run test vectors
        run: flutter test test/test_vectors_test.dart -r expanded

  # ── Gate 5: OSV Dependency Vulnerability Scan ──────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated dependencies
        run: flutter pub outdated

      - name: Scan for supply chain risks
        run: |
          echo "=== Dependency Security Audit ==="

          # Verify no git dependencies (supply chain risk)
          if grep -qE 'url:.*github|url:.*git' pubspec.yaml; then
            echo "FAIL: Git dependencies detected — use versioned pub packages"
            exit 1
          fi
          echo "PASS: No git dependencies"

          # Verify crypto deps are in lock file
          for dep in cryptography crypto pqcrypto; do
            if grep -q "  $dep:" pubspec.lock 2>/dev/null; then
              echo "PASS: $dep pinned in pubspec.lock"
            else
              echo "WARNING: $dep not found in pubspec.lock"
            fi
          done

      - name: Install OSV-Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run OSV vulnerability scan
        run: |
          echo "=== OSV Vulnerability Scan ==="

          # Scan pubspec.lock for known vulnerabilities
          osv-scanner --lockfile=pubspec.lock --format=table || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 1 ]; then
              echo ""
              echo "Vulnerabilities found. Checking known-vulns exceptions..."

              # Check if all vulns are in known-vulns.yaml
              # For now, any vulnerability is a failure unless excepted
              echo "FAIL: Unexcepted vulnerabilities found"
              echo "If a vulnerability has been reviewed and accepted, add it to security/known-vulns.yaml"
              exit 1
            fi
            # Exit code 128 = no lockfile found (shouldn't happen)
            exit $EXIT_CODE
          }
          echo "PASS: No known vulnerabilities"

      - name: Check known-vulns expiry dates
        run: |
          echo "=== Checking vulnerability exception expiry ==="
          EXCEPTIONS_FILE="security/known-vulns.yaml"

          if [ ! -f "$EXCEPTIONS_FILE" ]; then
            echo "No exceptions file found — OK"
            exit 0
          fi

          TODAY=$(date +%Y-%m-%d)
          EXPIRED=0

          # Parse YAML exceptions (simple grep-based for CI)
          while IFS= read -r line; do
            EXPIRY=$(echo "$line" | grep -oP 'expires:\s*"\K[^"]+' || true)
            if [ -n "$EXPIRY" ]; then
              if [[ "$EXPIRY" < "$TODAY" ]]; then
                ID=$(echo "$line" | grep -oP 'id:\s*"\K[^"]+' || echo "unknown")
                echo "EXPIRED: Exception $ID expired on $EXPIRY"
                EXPIRED=$((EXPIRED + 1))
              fi
            fi
          done < "$EXCEPTIONS_FILE"

          if [ "$EXPIRED" -gt 0 ]; then
            echo "FAIL: $EXPIRED expired exception(s) found — re-review or remove them"
            exit 1
          fi
          echo "PASS: No expired exceptions"

  # ── Gate 6: Custom SAST ────────────────────────────────────────────────
  sast:
    name: Security Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          ISSUES=0

          # Look for string literals assigned to secret-like variable names
          FOUND=$(grep -rnE "(apiKey|api_key|password|passwd|apiSecret|authToken|accessToken)\s*[:=]\s*['\"][A-Za-z0-9]" lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "POTENTIAL SECRET FOUND:"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "FAIL: $ISSUES potential hardcoded secret(s) found"
            exit 1
          fi
          echo "PASS: No hardcoded secrets detected"

      - name: Check for unsafe crypto patterns
        run: |
          echo "=== Scanning for unsafe crypto patterns ==="
          ISSUES=0

          # Insecure RNG: Random() without .secure()
          FOUND=$(grep -rnP '(?<!\.)Random\(\)' lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: Insecure Random() found (use Random.secure())"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          # MD5 usage (broken hash)
          FOUND=$(grep -rnE '\bmd5\b' lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: MD5 usage detected (use SHA-256+)"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          # Actual print() calls in production code
          # Exclude: doc comments (///), fingerprint/imprint/sprint variable names
          FOUND=$(grep -rn 'print(' lib/ --include='*.dart' 2>/dev/null | grep -v '///' | grep -vi 'fingerprint\|imprint\|sprint\|blueprint\|footprint' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: print() statements found in production code"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "FAIL: $ISSUES unsafe crypto pattern(s) found"
            exit 1
          fi
          echo "PASS: No unsafe crypto patterns detected"

  # ── Gate 7: Semgrep SAST ───────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep with crypto-focused rules
        run: |
          echo "=== Semgrep SAST Scan ==="
          semgrep scan \
            --config .semgrep.yml \
            --error \
            --sarif \
            --output semgrep-results.sarif \
            lib/ || {
              echo "Semgrep found issues — see SARIF output"
              # Still upload SARIF even on failure
              true
          }

          # Also run with Semgrep community crypto rules
          semgrep scan \
            --config "p/secrets" \
            --error \
            lib/ || true

          echo "=== Semgrep scan complete ==="

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
        continue-on-error: true

  # ── Changelog Gate (PRs only) ──────────────────────────────────────────
  changelog:
    name: Changelog Updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'CHANGELOG.md'; then
            echo "PASS: CHANGELOG.md was updated"
          else
            echo "FAIL: CHANGELOG.md must be updated for every PR"
            exit 1
          fi
