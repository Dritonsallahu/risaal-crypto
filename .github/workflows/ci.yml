name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ── Gate 1: Static Analysis ────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal warnings)
        run: flutter analyze --fatal-warnings --no-fatal-infos

  # ── Gate 2: Format Check ───────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          dart format .
          if [ -n "$(git diff --name-only)" ]; then
            echo "FAIL: The following files need formatting:"
            git diff --name-only
            echo ""
            echo "Run 'dart format .' locally and commit the changes."
            exit 1
          fi
          echo "PASS: All files properly formatted"

  # ── Gate 3: Tests + Coverage Enforcement ────────────────────────────
  test:
    name: Tests + Coverage Enforcement
    runs-on: ubuntu-latest
    needs: [analyze, format]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Verify coverage report exists
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: No coverage report generated"
            exit 1
          fi

      - name: Enforce minimum coverage threshold (80%)
        run: |
          TOTAL_LINES=$(grep -c '^DA:' coverage/lcov.info || echo 0)
          HIT_LINES=$(grep '^DA:' coverage/lcov.info | grep -v ',0$' | wc -l | tr -d ' ')

          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "ERROR: No coverage data found"
            exit 1
          fi

          COVERAGE=$(( HIT_LINES * 100 / TOTAL_LINES ))
          echo "Coverage: $COVERAGE% ($HIT_LINES / $TOTAL_LINES lines)"

          if [ "$COVERAGE" -lt 80 ]; then
            echo "FAIL: Coverage $COVERAGE% is below minimum threshold of 80%"
            exit 1
          fi

          echo "PASS: Coverage $COVERAGE% meets minimum threshold of 80%"

  # ── Gate 4: Adversarial & Fuzz Tests ───────────────────────────────
  adversarial:
    name: Adversarial & Fuzz Tests
    runs-on: ubuntu-latest
    needs: [analyze, format]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run adversarial crypto tests
        run: flutter test test/adversarial_crypto_test.dart -r expanded

      - name: Run fuzz tests
        run: flutter test test/fuzz_test.dart -r expanded

      - name: Run memory hygiene tests
        run: flutter test test/memory_hygiene_test.dart -r expanded

      - name: Run test vectors
        run: flutter test test/test_vectors_test.dart -r expanded

  # ── Gate 5: Dependency Vulnerability Scan ──────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check for outdated dependencies
        run: flutter pub outdated

      - name: Scan for supply chain risks
        run: |
          echo "=== Dependency Security Audit ==="

          # Verify no git dependencies (supply chain risk)
          if grep -qE 'url:.*github|url:.*git' pubspec.yaml; then
            echo "FAIL: Git dependencies detected — use versioned pub packages"
            exit 1
          fi
          echo "PASS: No git dependencies"

          # Verify crypto deps are in lock file
          for dep in cryptography crypto pqcrypto; do
            if grep -q "  $dep:" pubspec.lock 2>/dev/null; then
              echo "PASS: $dep pinned in pubspec.lock"
            else
              echo "WARNING: $dep not found in pubspec.lock"
            fi
          done

  # ── Gate 6: SAST ──────────────────────────────────────────────────
  sast:
    name: Security Static Analysis (SAST)
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check for hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          ISSUES=0

          # Look for string literals assigned to secret-like variable names
          FOUND=$(grep -rnE "(apiKey|api_key|password|passwd|apiSecret|authToken|accessToken)\s*[:=]\s*['\"][A-Za-z0-9]" lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "POTENTIAL SECRET FOUND:"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "FAIL: $ISSUES potential hardcoded secret(s) found"
            exit 1
          fi
          echo "PASS: No hardcoded secrets detected"

      - name: Check for unsafe crypto patterns
        run: |
          echo "=== Scanning for unsafe crypto patterns ==="
          ISSUES=0

          # Insecure RNG: Random() without .secure()
          FOUND=$(grep -rnP '(?<!\.)Random\(\)' lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: Insecure Random() found (use Random.secure())"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          # MD5 usage (broken hash)
          FOUND=$(grep -rnE '\bmd5\b' lib/ --include='*.dart' 2>/dev/null | grep -vE '^\s*//' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: MD5 usage detected (use SHA-256+)"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          # Actual print() calls in production code
          # Exclude: doc comments (///), fingerprint/imprint/sprint variable names
          FOUND=$(grep -rn 'print(' lib/ --include='*.dart' 2>/dev/null | grep -v '///' | grep -vi 'fingerprint\|imprint\|sprint\|blueprint\|footprint' || true)
          if [ -n "$FOUND" ]; then
            echo "FAIL: print() statements found in production code"
            echo "$FOUND"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "FAIL: $ISSUES unsafe crypto pattern(s) found"
            exit 1
          fi
          echo "PASS: No unsafe crypto patterns detected"

  # ── Changelog Gate (PRs only) ──────────────────────────────────────
  changelog:
    name: Changelog Updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q 'CHANGELOG.md'; then
            echo "PASS: CHANGELOG.md was updated"
          else
            echo "FAIL: CHANGELOG.md must be updated for every PR"
            exit 1
          fi
