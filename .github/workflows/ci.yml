name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal warnings, non-fatal infos)
        run: flutter analyze --fatal-warnings --no-fatal-infos

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Verify coverage report exists
        run: test -f coverage/lcov.info && echo "Coverage report generated" || (echo "ERROR: No coverage report" && exit 1)

  adversarial:
    name: Adversarial & Fuzz Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run adversarial crypto tests
        run: flutter test test/adversarial_crypto_test.dart -r expanded

      - name: Run fuzz tests
        run: flutter test test/fuzz_test.dart -r expanded

      - name: Run memory hygiene tests
        run: flutter test test/memory_hygiene_test.dart -r expanded

      - name: Run test vectors
        run: flutter test test/test_vectors_test.dart -r expanded

  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  deps:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check outdated dependencies
        run: flutter pub outdated
